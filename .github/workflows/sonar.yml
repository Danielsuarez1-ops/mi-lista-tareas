name: SonarCloud

on:
  push:
    branches:
      - main

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectKey: Danielsuarez1-ops_mi-lista-tareas
          organization: danielsuarez1-ops
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
